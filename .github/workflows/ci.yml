name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build package
        run: |
          xcodebuild -scheme Ultimate-Package \
            -destination 'generic/platform=iOS Simulator' \
            build
